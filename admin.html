<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Suplementos Fitness VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body class="admin-body">
    <nav class="admin-nav">
        <div class="nav-content">
            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Volver a la Web</a>
            <h1 class="admin-logo">Admin <span class="green">Inventory</span></h1>
        </div>
    </nav>

    <main class="admin-container section-padding">
        <div class="admin-grid">
            <!-- Add Product Form -->
            <section class="admin-card add-product-section">
                <h2>Añadir <span class="green">Producto</span></h2>
                <form id="add-product-form">
                    <div class="form-group">
                        <label>Nombre del Producto</label>
                        <input type="text" id="prod-name" placeholder="Ej: Whey Protein Gold" required>
                    </div>
                    <div class="form-group">
                        <label>Precio ($)</label>
                        <input type="number" id="prod-price" step="0.01" placeholder="Ej: 49.99" required>
                    </div>
                    <div class="form-group">
                        <label>Categoría</label>
                        <select id="prod-category">
                            <option value="Pre-entreno">Pre-entreno</option>
                            <option value="Creatinas">Creatinas</option>
                            <option value="Proteínas">Proteínas</option>
                            <option value="Aminoácidos">Aminoácidos</option>
                        </select>
                    </div>
                    <button type="submit" class="admin-btn">Guardar Producto</button>
                </form>
            </section>

            <!-- Inventory List -->
            <section class="admin-card inventory-section">
                <h2>Inventario <span class="green">Actual</span></h2>
                <div class="inventory-table-wrapper">
                    <table id="inventory-table">
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Categoría</th>
                                <th>Precio</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-body">
                            <!-- JS will populate -->
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <style>
        .admin-body {
            background: #080808;
        }

        .admin-nav {
            padding: 20px 5%;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: #000;
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .back-link:hover {
            color: var(--primary-color);
        }

        .admin-logo {
            font-size: 20px;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 40px;
        }

        .admin-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .admin-card h2 {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 254, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 6px;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: var(--primary-color);
        }

        .admin-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary-color);
            border: none;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.3s;
        }

        .admin-btn:hover {
            background: white;
            transform: translateY(-2px);
        }

        .inventory-table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            text-align: left;
            font-size: 12px;
            color: var(--text-muted);
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            text-transform: uppercase;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
        }

        .delete-btn {
            background: none;
            border: 1px solid rgba(255, 0, 0, 0.2);
            color: #ff4444;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s;
        }

        .delete-btn:hover {
            background: #ff4444;
            color: white;
            border-color: #ff4444;
        }

        @media (max-width: 992px) {
            .admin-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>

    <script type="module" src="js/admin/admin_logic.js"></script>
</body>

</html>
