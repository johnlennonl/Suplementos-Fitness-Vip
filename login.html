<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Admin | Suplementos Fitness VIP</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="logo">
                    <span class="logo-text">FITNESS<span class="highlight">VIP</span></span>
                </div>
                <h1>Panel de Control</h1>
                <p>Ingresa tus credenciales para administrar el negocio</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="login-email" placeholder="admin@fitnessvip.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Contraseña</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="login-btn">Acceder Ahora</button>
                <div id="login-error" class="error-msg"></div>
            </form>

            <div class="login-footer">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Volver a la web principal</a>
            </div>
        </div>
    </div>

    <style>
        .login-page {
            background: radial-gradient(circle at center, #0a0a0a 0%, #000000 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h1 {
            font-size: 1.8rem;
            margin-top: 20px;
            letter-spacing: -0.02em;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 10px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--primary-color);
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 0.1em;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 10px;
            outline: none;
            transition: var(--transition-smooth);
        }

        .form-group input:focus {
            border-color: var(--primary-color);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 15px rgba(153, 255, 0, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 18px;
            background: var(--primary-color);
            color: black;
            border: none;
            border-radius: 10px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition-smooth);
            margin-top: 10px;
        }

        .login-btn:hover {
            background: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
        }

        .error-msg {
            color: #ff4444;
            font-size: 13px;
            text-align: center;
            margin-top: 15px;
            min-height: 20px;
        }

        .login-footer {
            margin-top: 40px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
        }

        .login-footer a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            transition: var(--transition-smooth);
        }

        .login-footer a:hover {
            color: white;
        }
    </style>

    <script type="module" src="js/admin/login.js"></script>
</body>

</html>
